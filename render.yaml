services:
  - type: web
    name: rankpilot-api
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && alembic upgrade head && python app/ai/train.py"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
